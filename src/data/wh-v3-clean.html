    c.style.width = w + 'px'; c.style.height = h + 'px';
    c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
  });
  state.width = w; state.height = h;

  const pad = 70;
  const minLon = Math.min(...GPS.map(p => p.lon)), maxLon = Math.max(...GPS.map(p => p.lon));
  const minLat = Math.min(...GPS.map(p => p.lat)), maxLat = Math.max(...GPS.map(p => p.lat));
  const s  = Math.min((w - pad*2) / (maxLon - minLon), (h - pad*2) / (maxLat - minLat));
  const ox = (w - (maxLon - minLon) * s) / 2;
  const oy = (h - (maxLat - minLat) * s) / 2;
  const toXY = (lat, lon) => ({ x: ox + (lon - minLon) * s, y: h - (oy + (lat - minLat) * s) });

  state.projected    = GPS.map(p => toXY(p.lat, p.lon));
  state.projectedPDI = PDI.map(p => toXY(p.lat, p.lon));

  off.getContext('2d').clearRect(0, 0, w, h);
  drawIdle();
}
window.addEventListener('resize', project);
project();

// ─────────────────────────────────────────────────────────────────────────────
// VIENTO
// ─────────────────────────────────────────────────────────────────────────────
async function fetchWind() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.0722&longitude=-118.4402&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m');
    const j = await r.json();
    const c = j.current || {};
    state.wind = { speed: c.wind_speed_10m || 2, direction: c.wind_direction_10m || 270, gusts: c.wind_gusts_10m || 3 };
    document.getElementById('h-wind').textContent  = (state.wind.speed * 3.6).toFixed(1) + ' km/h ' + compass(state.wind.direction);
    document.getElementById('h-gusts').textContent = state.wind.gusts.toFixed(1) + ' m/s';
  } catch(e) {}
}
fetchWind();
setInterval(fetchWind, 30000);

// ─────────────────────────────────────────────────────────────────────────────
// IDLE
// ─────────────────────────────────────────────────────────────────────────────
function drawIdle() {
  const ctx = main.getContext('2d');
  ctx.fillStyle = '#0f0d14'; ctx.fillRect(0, 0, state.width, state.height);
  ctx.drawImage(off, 0, 0, state.width, state.height);
  drawLabel(ctx);
}
function drawLabel(ctx) {
  const { width: w, height: h } = state;
  ctx.save(); ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.42)';
  ctx.font = 'bold 26px -apple-system, sans-serif';
  ctx.fillText('WEST HOLLYWOOD', w/2, h * 0.84);
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.font = '15px -apple-system, sans-serif';
  ctx.fillText('Los Angeles, California', w/2, h * 0.84 + 24);
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
// AUDIO
// ─────────────────────────────────────────────────────────────────────────────
function initAudio() {
  const Ctx = window.AudioContext || window.webkitAudioContext;
  const ctx = new Ctx();
  const osc = ctx.createOscillator();
  const filter = ctx.createBiquadFilter();
  const gain = ctx.createGain();
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();

  osc.type = 'triangle';              // onda triangular
  osc.frequency.value = 143.3 * 2;   // primer punto: 286.6Hz (2Hz × metro)

  filter.type = 'lowpass';
  filter.frequency.value = 1200;
  filter.Q.value = 2;

  gain.gain.value = 0;
  lfo.type = 'sine';
  lfo.frequency.value = 0.5;
  lfoGain.gain.value = 0;

  lfo.connect(lfoGain); lfoGain.connect(gain.gain);
  osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
  osc.start(); lfo.start();
  state.audio = { ctx, osc, filter, gain, lfo, lfoGain };
}

// KICK: bombo sine + click ruido blanco
function fireKick(cumNow, maxDist) {
  const a = state.audio; if (!a) return;
  const t = a.ctx.currentTime + 0.001;

  // Bombo
  const kick = a.ctx.createOscillator();
  const kg   = a.ctx.createGain();
  kick.type = 'sine';
  kick.frequency.setValueAtTime(110, t);
  kick.frequency.exponentialRampToValueAtTime(38, t + 0.08);
  kg.gain.setValueAtTime(0.7, t);
  kg.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
  kick.connect(kg); kg.connect(a.ctx.destination);
  kick.start(t); kick.stop(t + 0.13);

  // Click
  const buf  = a.ctx.createBuffer(1, Math.floor(a.ctx.sampleRate * 0.025), a.ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  const src = a.ctx.createBufferSource(); src.buffer = buf;
  const bp  = a.ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 6;
  bp.frequency.value = mapRange(cumNow, 0, maxDist, 1200, 5000);
  const g = a.ctx.createGain();
  g.gain.setValueAtTime(0.4, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.025);
  src.connect(bp); bp.connect(g); g.connect(a.ctx.destination);
  src.start(t); src.stop(t + 0.03);
}

// ─────────────────────────────────────────────────────────────────────────────
// DISTANCIA ACUMULADA
// ─────────────────────────────────────────────────────────────────────────────
let totalDist = 0, cumDist = [];
GPS.forEach(p => { totalDist += p.dist; cumDist.push(totalDist); });

// ─────────────────────────────────────────────────────────────────────────────
// PLAY
// ─────────────────────────────────────────────────────────────────────────────
function handlePlay() {
  if (state.running) return;
  state.running = true; state.finished = false;
  state.pdiLabels = []; state.pdiSeen = new Set();
  document.getElementById('playbtn').disabled = true;
  document.getElementById('playbtn').textContent = '● PLAYING';
  off.getContext('2d').clearRect(0, 0, state.width, state.height);
  state.activeIdx = 0;
  initAudio();

  for (let i = 1; i < GPS.length; i++) {
    const delayMs = GPS[i].elapsed * 1000 * COMPRESS;
    const segMs   = (GPS[i].elapsed - GPS[i-1].elapsed) * 1000 * COMPRESS;
    const ii = i, sm = segMs;
    state.timeouts.push(setTimeout(() => step(ii, sm / 1000), delayMs));
  }
  const lastMs = GPS[GPS.length-1].elapsed * 1000 * COMPRESS;
  state.timeouts.push(setTimeout(finish, lastMs + 400));

  const loop = () => { render(); state.rafId = requestAnimationFrame(loop); };
  state.rafId = requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────────────────────────────────────
// STEP
// ─────────────────────────────────────────────────────────────────────────────
function step(i, segSec) {
  const proj   = state.projected;
  const oc     = off.getContext('2d');
  const a      = state.audio;
  const seg    = GPS[i];
  const cumNow = cumDist[i];

  // Visual
  const normSlope = Math.min(1, Math.abs(seg.slope) / 0.2);
  const lw = Math.max(1.5, normSlope * 8 + 2);
  oc.save();
  oc.globalAlpha = 0.38;
  oc.strokeStyle = headingColor(seg.heading);
  oc.lineWidth   = lw;
  oc.lineCap     = 'round';
  oc.beginPath();
  oc.moveTo(proj[i-1].x, proj[i-1].y);
  oc.lineTo(proj[i].x,   proj[i].y);
  oc.stroke();
  oc.restore();

  state.activeIdx = i;

  // Audio
  if (a) {
    const t    = a.ctx.currentTime;
    const ramp = Math.max(0.04, segSec * 0.7);

    a.osc.frequency.linearRampToValueAtTime(seg.ele * 2, t + ramp);  // 2Hz/metro
    const cutoff = headingToCutoff(seg.heading) + state.wind.gusts * 60;
    a.filter.frequency.linearRampToValueAtTime(cutoff, t + ramp);
    a.filter.Q.linearRampToValueAtTime(headingToQ(seg.heading), t + ramp);
    const gainV = mapRange(Math.max(0, seg.slope), 0, 0.3, 0.12, 0.35);
    a.gain.gain.linearRampToValueAtTime(gainV, t + ramp);
    a.lfo.frequency.linearRampToValueAtTime(mapRange(state.wind.speed, 0, 20, 0.2, 4), t + ramp);
    a.lfoGain.gain.linearRampToValueAtTime(mapRange(state.wind.speed, 0, 20, 0, 0.07), t + ramp);
  }

  // Kick cada 4 puntos GPS
  if (i % 4 === 0) fireKick(cumNow, totalDist);

  // PDI: activar por proximidad
  PDI.forEach((pdi, pi) => {
    if (state.pdiSeen.has(pi)) return;
    if (haversine(seg.lat, seg.lon, pdi.lat, pdi.lon) <= PDI_RADIUS_M) {
      state.pdiSeen.add(pi);
      state.pdiLabels.push({
        name: pdi.name, desc: pdi.description,
        x: state.projectedPDI[pi].x, y: state.projectedPDI[pi].y,
        age: 0, maxAge: 200,
      });
    }
  });

  // HUD
  document.getElementById('h-freq').textContent    = Math.round(seg.ele * 2) + ' Hz';
  document.getElementById('h-cutoff').textContent  = Math.round(headingToCutoff(seg.heading)) + ' Hz';
  document.getElementById('h-ele').textContent     = seg.ele + ' m';
  document.getElementById('h-slope').textContent   = (seg.slope > 0 ? '+' : '') + seg.slope.toFixed(3);
  document.getElementById('h-heading').textContent = Math.round(seg.heading) + '° ' + compass(seg.heading);
}

// ─────────────────────────────────────────────────────────────────────────────
// FINISH
// ─────────────────────────────────────────────────────────────────────────────
function finish() {
  state.running = false; state.finished = true;
  document.getElementById('playbtn').disabled = false;
  document.getElementById('playbtn').textContent = '▶ PLAY AGAIN';
  const a = state.audio;
  if (a) {
    a.gain.gain.linearRampToValueAtTime(0, a.ctx.currentTime + 2);
    setTimeout(() => { try { a.osc.stop(); a.lfo.stop(); a.ctx.close(); } catch(e){} state.audio = null; }, 2300);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// PARTÍCULAS VIENTO
// ─────────────────────────────────────────────────────────────────────────────
function spawnParticle() {
  const { width: w, height: h, wind } = state;
  const rad = (wind.direction + 180) * Math.PI / 180;
  const spd = Math.max(0.3, wind.speed * 0.22);
  return { x: Math.random()*w, y: Math.random()*h, vx: Math.sin(rad)*spd, vy: -Math.cos(rad)*spd, life: 0, maxLife: 90 + Math.random()*130, trail: [] };
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function render() {
  const ctx = main.getContext('2d');
  const { width: w, height: h, projected: proj } = state;

  ctx.fillStyle = '#0f0d14'; ctx.fillRect(0, 0, w, h);
  ctx.drawImage(off, 0, 0, w, h);

  // Partículas
  while (state.particles.length < 120) state.particles.push(spawnParticle());
  ctx.save(); ctx.lineWidth = 1.2; ctx.lineCap = 'round';
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx; p.y += p.vy; p.life++;
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > Math.max(10, state.wind.speed * 3)) p.trail.shift();
    const lt = p.life / p.maxLife;
    const alpha = (lt < 0.2 ? lt/0.2 : lt > 0.8 ? (1-lt)/0.2 : 1) * 0.35;
    ctx.strokeStyle = `rgba(125,211,252,${Math.max(0, Math.min(1, alpha))})`;
    ctx.beginPath();
    p.trail.forEach((t, j) => j === 0 ? ctx.moveTo(t.x, t.y) : ctx.lineTo(t.x, t.y));
    ctx.stroke();
    if (p.life >= p.maxLife || p.x < -20 || p.x > w+20 || p.y < -20 || p.y > h+20)
      state.particles[i] = spawnParticle();
  }
  ctx.restore();

  // Dot activo
  const idx = state.activeIdx;
  if (state.running && !state.finished && idx > 0 && idx < proj.length) {
    const seg = GPS[idx], color = headingColor(seg.heading);
    const r = Math.min(12, 5 + Math.abs(seg.slope) * 20);
    ctx.save();
    ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 20;
    ctx.beginPath(); ctx.arc(proj[idx].x, proj[idx].y, r, 0, Math.PI*2);
    ctx.fill(); ctx.restore();
  }

  // PDI labels
  ctx.save();
  for (let i = state.pdiLabels.length - 1; i >= 0; i--) {
    const L = state.pdiLabels[i];
    L.age++;
    const alpha = L.age < 20 ? L.age/20 : 1; // queda visible permanentemente

    const lx = Math.min(w - 200, Math.max(10, L.x + 22));
    const ly = Math.max(30, L.y - 28);

    ctx.globalAlpha = alpha;

    // Línea conector
    ctx.strokeStyle = 'rgba(125,211,252,0.5)';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(L.x, L.y); ctx.lineTo(lx, ly); ctx.stroke();

    // Punto marcador
    ctx.fillStyle = '#7dd3fc';
    ctx.shadowColor = '#7dd3fc'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(L.x, L.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // Nombre en cyan
    ctx.font = 'bold 11px -apple-system, sans-serif';
    ctx.fillStyle = '#7dd3fc';
    ctx.textAlign = 'left';
    ctx.fillText(L.name.toUpperCase(), lx + 4, ly);

    // Descripción en blanco
    ctx.font = '10px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    L.desc.split('\n').forEach((line, li) => ctx.fillText(line, lx + 4, ly + 14 + li * 13));

    // PDI permanente — no se elimina
  }
  ctx.restore();

  if (!state.running || state.finished) drawLabel(ctx);
}
</script>
