<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BikeSnds — Flowing Cartographies</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Courier New', monospace; }

/* ── LAYOUT 4032 × 2592 — canvas 2592 | panel 1440 ── */
#app {
  position: absolute;
  /* altura = 100vh, ancho = 100vh * (4032/2592) */
  height: 100vh;
  width: calc(100vh * 4032 / 2592);
  left: 50%;
  transform: translateX(-50%);
  max-width: 100vw;
  display: flex;
}
@media (max-aspect-ratio: 4032/2592) {
  #app {
    width: 100vw;
    height: calc(100vw * 2592 / 4032);
    top: 50%; left: 0;
    transform: translateY(-50%);
  }
}

/* ── CANVAS CUADRADO ── */
#canvas-wrap {
  flex-shrink: 0;
  /* 2592/4032 = 64.28% del total */
  width: calc(100% * 2592 / 4032);
  height: 100%;
  position: relative;
  background: #000;
}
#c { display:block; width:100%; height:100%; }

/* ── PANEL DERECHO ── */
#panel {
  flex: 1;
  height: 100%;
  background: #060608;
  border-left: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}

/* header del panel */
.panel-header {
  padding: 3% 6% 2%;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}
.panel-title {
  font-size: 2.2vh; letter-spacing: 0.5vh;
  color: rgba(255,255,255,0.95); text-transform: uppercase;
  font-weight: 400;
}
.panel-sub {
  font-size: 0.85vh; letter-spacing: 0.2vh;
  color: rgba(255,255,255,0.4); margin-top: 0.5vh;
}

/* transport */
.transport {
  padding: 3% 6% 2%;
  display: flex; gap: 3%;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}
.btn {
  flex: 1; padding: 2% 0;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  font-family: 'Courier New', monospace;
  font-size: 1.1vh; letter-spacing: 0.25vh;
  text-transform: uppercase; cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
.btn.active { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.4); }
.btn.danger { border-color: rgba(255,60,40,0.3); color: rgba(255,80,60,0.6); }
.btn.danger:hover { background: rgba(255,60,40,0.1); color: rgba(255,100,80,0.9); }

/* secciones */
.section {
  padding: 2.5% 6% 1.5%;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  flex-shrink: 0;
}
.section-title {
  font-size: 1.1vh; letter-spacing: 0.3vh;
  color: rgba(255,255,255,0.75); text-transform: uppercase;
  margin-bottom: 2%;
}

/* sliders */
.row {
  display: flex; align-items: center;
  gap: 3%; margin-bottom: 1.8%;
}
.row label {
  font-size: 1.05vh; letter-spacing: 0.15vh;
  color: rgba(255,255,255,0.85); text-transform: uppercase;
  width: 32%; flex-shrink: 0;
}
.row input[type=range] {
  flex: 1; accent-color: rgba(255,255,255,0.5);
  height: 2px; cursor: pointer;
}
.row .val {
  font-size: 1.15vh; color: #fff;
  width: 24%; text-align: right; flex-shrink: 0;
}

/* toggle switches */
.toggle-row {
  display: flex; align-items: center; gap: 3%; margin-bottom: 1.8%;
}
.toggle-row label {
  font-size: 1.05vh; letter-spacing: 0.15vh;
  color: rgba(255,255,255,0.85); text-transform: uppercase;
  flex: 1;
}
.toggle {
  width: 5vh; height: 2.5vh;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 99px; cursor: pointer;
  position: relative; transition: background 0.2s;
  flex-shrink: 0;
}
.toggle.on { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.35); }
.toggle::after {
  content: '';
  position: absolute; top: 15%; left: 8%;
  width: 70%; height: 70%;
  background: rgba(255,255,255,0.4);
  border-radius: 99px; transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(60%); background: #fff; }

/* live data readout */
.readout {
  flex-shrink: 0;
  padding: 2.5% 6%;
  display: flex; flex-direction: column; gap: 1.5%;
}
.readout-title {
  font-size: 1vh; letter-spacing: 0.3vh;
  color: rgba(255,255,255,0.7); text-transform: uppercase;
  margin-bottom: 1%; flex-shrink: 0;
}
.data-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 2.5%;
}
.data-cell {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 5% 6%;
}
.data-label {
  font-size: 0.95vh; letter-spacing: 0.2vh;
  color: rgba(255,255,255,0.7); text-transform: uppercase;
  margin-bottom: 1%;
}
.data-val {
  font-size: 2.8vh; font-weight: bold;
  color: #fff;
}

/* progress bar */
.progress-wrap {
  padding: 0 6% 2%;
  flex-shrink: 0;
}
.progress-bar {
  width: 100%; height: 2px;
  background: rgba(255,255,255,0.06);
  position: relative; cursor: pointer;
}
.progress-fill {
  height: 100%; background: rgba(255,255,255,0.35);
  transition: width 0.1s linear;
  width: 0%;
}
.progress-labels {
  display: flex; justify-content: space-between;
  font-size: 1vh; color: rgba(255,255,255,0.75);
  margin-top: 1%;
}

/* wind display */
.wind-row {
  display: flex; align-items: center; gap: 3%; padding: 3% 6%;
  border-top: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
  background: rgba(255,255,255,0.02);
}
.wind-compass-mini {
  width: 3vh; height: 3vh; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  position: relative; flex-shrink: 0;
}
.wind-needle {
  position: absolute; top: 50%; left: 50%;
  width: 1px; height: 40%;
  background: rgba(100,180,255,0.7);
  transform-origin: bottom center;
  transform: translate(-50%,-100%) rotate(0deg);
  transition: transform 1s ease;
}
.wind-info {
  font-size: 1.1vh; color: rgba(255,255,255,0.8);
  letter-spacing: 0.1vh;
}
.wind-info span { color: rgba(100,180,255,0.6); }

/* upload GPX */
.gpx-drop {
  margin: 0 6% 0;
  border: 1px dashed rgba(255,255,255,0.15);
  padding: 1.2% 4%;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  flex-shrink: 0;
  display:flex; align-items:center; justify-content:space-between;
}
.gpx-drop:hover, .gpx-drop.drag { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.03); }
.gpx-drop input { position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%; }
.gpx-drop-label {
  font-size: 1.05vh; letter-spacing: 0.2vh;
  color: rgba(255,255,255,0.75); text-transform: uppercase;
  pointer-events: none;
}
.gpx-info {
  font-size: 0.9vh; color: rgba(100,255,150,0.85);
  margin-top: 1.5%; letter-spacing: 0.1vh;
  min-height: 1.2vh;
}

/* start overlay */
#start {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #000; z-index: 100;
  cursor: pointer; gap: 2vh;
}
#start h1 {
  font-size: 2vh; letter-spacing: 0.8vh;
  color: rgba(255,255,255,0.9); text-transform: uppercase; font-weight: 400;
}
#start p { font-size: 1.2vh; letter-spacing: 0.3vh; color: rgba(255,255,255,0.6); }
</style>
</head>
<body>

<div id="start">
  <h1>BikeSnds</h1>
  <p>click to start · Flowing Cartographies</p>
</div>

<div id="app">

  <!-- ── PANEL DE CONTROL ── -->
  <div id="panel">

    <div class="panel-header">
      <div class="panel-title">BikeSnds</div>
      <div class="panel-sub">RanchoUCLA · 32 min · 195 pts GPS</div>
    </div>

    <!-- TRANSPORT -->
    <div class="transport">
      <button class="btn" id="btn-play">▶ Play</button>
      <button class="btn" id="btn-pause">⏸ Pause</button>
      <button class="btn" id="btn-mute">⊘ Mute</button>
      <button class="btn danger" id="btn-reset">↺ Reset</button>
    </div>

    <!-- UPLOAD GPX -->
    <div class="gpx-drop" id="gpx-drop">
      <input type="file" id="gpx-file" accept=".gpx">
      <div class="gpx-drop-label">⬆ Cargar GPX</div>
      <div class="gpx-info" id="gpx-info"></div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-labels">
        <span id="prog-time">0:00</span>
        <span id="prog-pt">pt 0 / 195</span>
        <span>32:00</span>
      </div>
    </div>

    <!-- VELOCIDAD -->
    <div class="section">
      <div class="section-title">Velocidad</div>
      <div class="row">
        <label>Tempo</label>
        <input type="range" id="spd" min="0" max="1" step="0.001" value="0">
        <span class="val" id="spd-v">1.0x · 32:00</span>
      </div>
    </div>

    <!-- VISUAL -->
    <div class="section">
      <div class="section-title">Visual</div>
      <div class="row">
        <label>Espesor</label>
        <input type="range" id="wid" min="0.5" max="14" step="0.5" value="3">
        <span class="val" id="wid-v">3.0</span>
      </div>
      <div class="row">
        <label>Fade</label>
        <input type="range" id="fad" min="0.01" max="0.5" step="0.01" value="0.1">
        <span class="val" id="fad-v">0.10</span>
      </div>
      <div class="row">
        <label>HR color</label>
        <input type="range" id="hrm" min="0" max="1" step="0.05" value="1">
        <span class="val" id="hrm-v">1.00</span>
      </div>
      <div class="row">
        <label>Glow</label>
        <input type="range" id="glow" min="0" max="1" step="0.05" value="0.4">
        <span class="val" id="glow-v">0.40</span>
      </div>
    </div>

    <!-- AUDIO -->
    <div class="section">
      <div class="section-title">Audio</div>
      <div class="row">
        <label>Master</label>
        <input type="range" id="master" min="0" max="1" step="0.05" value="0.8">
        <span class="val" id="master-v">0.80</span>
      </div>
      <div class="row">
        <label>Osc vol</label>
        <input type="range" id="ovol" min="0" max="1" step="0.05" value="0.25">
        <span class="val" id="ovol-v">0.25</span>
      </div>
      <div class="row">
        <label>Click vol</label>
        <input type="range" id="clvol" min="0" max="1" step="0.05" value="0.35">
        <span class="val" id="clvol-v">0.35</span>
      </div>
      <div class="row">
        <label>Kick vol</label>
        <input type="range" id="kvol" min="0" max="1" step="0.05" value="0.5">
        <span class="val" id="kvol-v">0.50</span>
      </div>
      <div class="row">
        <label>Delay mix</label>
        <input type="range" id="dmix" min="0" max="1" step="0.05" value="0.3">
        <span class="val" id="dmix-v">0.30</span>
      </div>
    </div>

    <!-- TOGGLES -->
    <div class="section">
      <div class="section-title">On / Off</div>
      <div class="toggle-row">
        <label>Oscilador</label>
        <div class="toggle on" id="tog-osc"></div>
      </div>
      <div class="toggle-row">
        <label>Click GPS</label>
        <div class="toggle on" id="tog-click"></div>
      </div>
      <div class="toggle-row">
        <label>Kick cadencia</label>
        <div class="toggle on" id="tog-kick"></div>
      </div>
      <div class="toggle-row">
        <label>Filtro HR</label>
        <div class="toggle on" id="tog-filter"></div>
      </div>
      <div class="toggle-row">
        <label>Delay heading</label>
        <div class="toggle on" id="tog-delay"></div>
      </div>
      <div class="toggle-row">
        <label>LFO viento</label>
        <div class="toggle on" id="tog-lfo"></div>
      </div>
    </div>

    <!-- LIVE DATA -->
    <div class="readout">
      <div class="readout-title">Live data</div>
      <div class="data-grid">
        <div class="data-cell"><div class="data-label">Elevación</div><div class="data-val" id="d-ele">—</div></div>
        <div class="data-cell"><div class="data-label">FC</div><div class="data-val" id="d-hr">—</div></div>
        <div class="data-cell"><div class="data-label">Cadencia</div><div class="data-val" id="d-cad">—</div></div>
        <div class="data-cell"><div class="data-label">Velocidad</div><div class="data-val" id="d-spd">—</div></div>
      </div>
      <div style="display:none"><span id="d-head"></span><span id="d-filt"></span></div>
    </div>

    <!-- WIND -->
    <div class="wind-row">
      <div class="wind-compass-mini">
        <div class="wind-needle" id="wind-needle"></div>
      </div>
      <div class="wind-info">
        WIND <span id="wv">—</span> m/s &nbsp; <span id="wd">—</span>°
        &nbsp;·&nbsp; LFO <span id="lfo-rate">—</span> Hz
      </div>
    </div>

  </div><!-- /panel -->

  <!-- ── CANVAS CUADRADO ── -->
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
  </div>

</div><!-- /app -->

// ══ AUDIO ═════════════════════════════════════════════════════════════════
var AC,masterGain,filterNode,delayNode,delayFeedback,delayWet,delayDry,oscNode,oscGain,lfoNode,lfoGain;
var windSpd=3,windDir=210;

function initAudio(){
  AC=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=AC.createGain(); masterGain.gain.value=P.master;
  masterGain.connect(AC.destination);
  filterNode=AC.createBiquadFilter(); filterNode.type='lowpass';
  filterNode.frequency.value=400; filterNode.Q.value=1;
  filterNode.connect(masterGain);
  delayNode=AC.createDelay(2.0);
  delayFeedback=AC.createGain(); delayFeedback.gain.value=0.35;
  delayWet=AC.createGain(); delayWet.gain.value=P.delayMix;
  delayDry=AC.createGain(); delayDry.gain.value=1-P.delayMix;
  filterNode.connect(delayDry); filterNode.connect(delayNode);
  delayNode.connect(delayFeedback); delayNode.connect(delayWet);
  delayFeedback.connect(delayNode);
  delayDry.connect(masterGain); delayWet.connect(masterGain);
  oscNode=AC.createOscillator(); oscNode.type='triangle';
  oscNode.frequency.value=80;
  oscGain=AC.createGain(); oscGain.gain.value=T.osc?P.oscVol*0.3:0;
  oscNode.connect(oscGain); oscGain.connect(filterNode); oscNode.start();
  lfoNode=AC.createOscillator(); lfoNode.type='sine'; lfoNode.frequency.value=0.15;
  lfoGain=AC.createGain(); lfoGain.gain.value=4;
  lfoNode.connect(lfoGain); lfoGain.connect(oscNode.frequency); lfoNode.start();
  fetchWind(); setInterval(fetchWind,60000);
}

function onParamChange(key){
  if(!AC)return;
  if(key==='master') masterGain.gain.setTargetAtTime(P.master,AC.currentTime,0.05);
  if(key==='oscVol') oscGain.gain.setTargetAtTime(T.osc?P.oscVol*0.3:0,AC.currentTime,0.05);
  if(key==='delayMix'){
    delayWet.gain.setTargetAtTime(P.delayMix,AC.currentTime,0.1);
    delayDry.gain.setTargetAtTime(1-P.delayMix,AC.currentTime,0.1);
  }
}
function onToggleChange(key){
  if(!AC)return;
  if(key==='osc') oscGain.gain.setTargetAtTime(T.osc?P.oscVol*0.3:0,AC.currentTime,0.05);
  if(key==='lfo') lfoGain.gain.setTargetAtTime(T.lfo?2+windSpd*0.8:0,AC.currentTime,0.1);
  if(key==='delay'){
    delayWet.gain.setTargetAtTime(T.delay?P.delayMix:0,AC.currentTime,0.1);
    delayDry.gain.setTargetAtTime(T.delay?1-P.delayMix:1,AC.currentTime,0.1);
  }
}

async function fetchWind(){
  try{
    var r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.055&longitude=-118.437&current=wind_speed_10m,wind_direction_10m&timezone=America%2FLos_Angeles');
    if(r.ok){var d=await r.json();if(d.current){windSpd=d.current.wind_speed_10m||windSpd;windDir=d.current.wind_direction_10m||windDir;}}
  }catch(e){}
  document.getElementById('wv').textContent=windSpd.toFixed(1);
  document.getElementById('wd').textContent=Math.round(windDir);
  document.getElementById('wind-needle').style.transform='translate(-50%,-100%) rotate('+windDir+'deg)';
  if(lfoNode&&T.lfo){
    var rate=0.05+windSpd*0.08;
    lfoNode.frequency.value=rate;
    document.getElementById('lfo-rate').textContent=rate.toFixed(2);
  }
  if(lfoGain&&T.lfo) lfoGain.gain.value=2+windSpd*0.8;
}

function updateFilter(pt){
  if(!AC)return;
  var hrN=nm(pt.hr,window.HR_MIN_DYN||HR_MIN,window.HR_MAX_DYN||HR_MAX),spdN=nm(pt.speed,0,window.SPD_MAX_DYN||SPD_MAX);
  if(T.filter){
    filterNode.frequency.setTargetAtTime(200+hrN*3300,AC.currentTime,0.3);
    filterNode.Q.setTargetAtTime(0.5+spdN*7.5,AC.currentTime,0.2);
    document.getElementById('d-filt').textContent=Math.round(200+hrN*3300)+'Hz';
  }
  if(T.delay){
    var headN=pt.heading/360;
    delayNode.delayTime.setTargetAtTime(0.05+headN*0.45,AC.currentTime,0.5);
    delayFeedback.gain.setTargetAtTime(0.1+headN*0.5,AC.currentTime,0.5);
  }
  oscNode.frequency.setTargetAtTime(pt.ele,AC.currentTime,0.15);
}

function triggerClick(){
  if(!AC||!T.click)return;
  var buf=AC.createBuffer(1,Math.floor(AC.sampleRate*0.015),AC.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  var src=AC.createBufferSource(); src.buffer=buf;
  var g=AC.createGain(); g.gain.value=P.clickVol*0.35;
  src.connect(g); g.connect(filterNode); src.start();
}

function triggerKick(cad){
  if(!AC||!T.kick)return;
  var dur=0.28,o=AC.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(110,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(32,AC.currentTime+dur);
  var env=AC.createGain();
  env.gain.setValueAtTime(P.kickVol*nm(cad,20,84),AC.currentTime);
  env.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.connect(env); env.connect(masterGain); o.start(); o.stop(AC.currentTime+dur);
}

// ══ VIENTO PARTÍCULAS ═════════════════════════════════════════════════════
var wParts=[];
var WP_MAX=120;

function spawnWP(){
  if(wParts.length>=WP_MAX)return;
  var rad=((windDir+180)%360)*Math.PI/180;
  var vx0=Math.sin(rad),vy0=-Math.cos(rad);
  var fromRad=windDir*Math.PI/180;
  var fx=Math.sin(fromRad),fy=-Math.cos(fromRad);
  var x,y;
  if(Math.abs(fx)>Math.abs(fy)){x=fx>0?-0.02:1.02;y=Math.random();}
  else{x=Math.random();y=fy>0?-0.02:1.02;}
  wParts.push({x,y,ax:vx0,ay:vy0,life:1,
    decay:0.006+Math.random()*0.006,
    len:0.04+windSpd*0.008,
    alpha:0.5+Math.random()*0.4,
    no:Math.random()*200});
}

function updateWindParticles(ts){
  if(!T.lfo)return;
  wParts=wParts.filter(function(p){return p.life>0;});
  var tc=ts*0.00004;
  var spd=0.003+windSpd*0.0008;
  for(var i=0;i<wParts.length;i++){
    var p=wParts[i];
    var nx2=Math.sin(p.x*6+p.no+tc)*0.0004;
    var ny2=Math.cos(p.y*6+p.no+tc)*0.0004;
    p.x+=p.ax*spd+nx2;
    p.y+=p.ay*spd+ny2;
    p.life-=p.decay;
    if(p.x<-0.05||p.x>1.05||p.y<-0.05||p.y>1.05)p.life=0;
  }
  if(Math.random()<0.3) spawnWP();
}

function drawWindParticles(S){
  if(!T.lfo)return;
  var spd=0.003+windSpd*0.0008;
  for(var i=0;i<wParts.length;i++){
    var p=wParts[i];
    var px=p.x*S, py=p.y*S;
    if(px<-5||px>S+5||py<-5||py>S+5)continue;
    var dx=p.ax*spd*p.len*S;
    var dy=p.ay*spd*p.len*S;
    ctx.save();
    ctx.globalAlpha=p.life*p.alpha;
    ctx.strokeStyle='rgba(160,210,255,1)';
    ctx.lineWidth=1.0; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(px-dx,py-dy);
    ctx.lineTo(px,py);
    ctx.stroke();
    ctx.restore();
  }
}

// ══ VISUAL ═════════════════════════════════════════════════════════════════
function lineColor(hr,alpha){
  var HM2=window.HR_MIN_DYN||HR_MIN,HX2=window.HR_MAX_DYN||HR_MAX;
  var hrN=nm(hr,HM2,HX2);
  var h=28*(1-P.hrMix)+(220-hrN*220)*P.hrMix;
  return 'hsla('+h+','+(60+hrN*30)+'%,'+(50+hrN*15)+'%,'+alpha+')';
}

var frameCount=0;
function loop(ts){
  requestAnimationFrame(loop);
  var dt=0;
  if(playing){
    dt=Math.min((ts-lastT)/1000,0.05)*P.speed;
    cycleT=(cycleT+dt)%CYCLE;
  }
  lastT=ts;
  frameCount++;

  var S=cv.width; // cuadrado
  var filling=cycleT<FILL;
  var headF=filling?cycleT/FILL:1;
  var tailF=filling?0:(cycleT-FILL)/DRAIN;
  var TD=trackData;
  var n=TD.length;
  var hi=Math.floor(headF*(n-1));
  var ti=Math.floor(tailF*(n-1));
  var EM=window.ELE_MIN_DYN||ELE_MIN,EX=window.ELE_MAX_DYN||ELE_MAX;
  var HM=window.HR_MIN_DYN||HR_MIN,HX=window.HR_MAX_DYN||HR_MAX;

  // triggers
  if(playing&&filling&&hi!==lastIdx&&hi<n){
    var pt=TD[hi];
    triggerClick();
    if(pt.cadence>15) triggerKick(pt.cadence);
    updateFilter(pt);
    lastIdx=hi;
    // live data
    if(frameCount%2===0){
      document.getElementById('d-ele').textContent=Math.round(pt.ele)+'m';
      document.getElementById('d-hr').textContent=pt.hr+' bpm';
      document.getElementById('d-cad').textContent=pt.cadence+' rpm';
      document.getElementById('d-spd').textContent=pt.speed.toFixed(1)+' m/s';
      document.getElementById('d-head').textContent=Math.round(pt.heading)+'°';
    }
  }
  if(!playing||!filling) lastIdx=-1;

  // progress
  if(frameCount%3===0){
    var pct=filling?cycleT/FILL:1;
    document.getElementById('progress-fill').style.width=(pct*100)+'%';
    var secs=Math.round(cycleT/CYCLE*(window.REAL_DUR||REAL_DUR)); // duración real
    document.getElementById('prog-time').textContent=
      Math.floor(secs/60)+':'+(secs%60<10?'0':'')+secs%60;
    document.getElementById('prog-pt').textContent='pt '+hi+' / '+n;
  }

  // draw
  ctx.fillStyle='rgba(0,0,0,'+P.fade+')';
  ctx.fillRect(0,0,S,S);

  // partículas de viento
  updateWindParticles(ts);
  drawWindParticles(S);
  if(hi<=ti)return;

  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
  var segLen=hi-ti;
  for(var i=ti+1;i<=hi;i++){
    var prev=TD[i-1],curr=TD[i];
    var pos=(i-ti)/segLen;
    var eleN=nm(curr.ele,EM,EX);
    var cadN=curr.cadence>0?0.4+nm(curr.cadence,20,84)*0.6:0.22;
    var lw=P.width*(0.4+eleN*0.8)*cadN;
    var alpha=filling?(0.5+pos*0.45)*cadN:pos*0.9*cadN;
    if(P.glowAmt>0.02){
      ctx.lineWidth=lw+5; ctx.strokeStyle=lineColor(curr.hr,alpha*P.glowAmt*0.3);
      ctx.beginPath(); ctx.moveTo(prev.nx*S,prev.ny*S); ctx.lineTo(curr.nx*S,curr.ny*S); ctx.stroke();
    }
    ctx.lineWidth=lw; ctx.strokeStyle=lineColor(curr.hr,alpha);
    ctx.beginPath(); ctx.moveTo(prev.nx*S,prev.ny*S); ctx.lineTo(curr.nx*S,curr.ny*S); ctx.stroke();
  }
  if(filling&&hi>0&&hi<n){
    var hpt=TD[hi];
    var hrN2=nm(hpt.hr,HM,HX),eN2=nm(hpt.ele,EM,EX);
    ctx.beginPath(); ctx.arc(hpt.nx*S,hpt.ny*S,P.width*0.7+eN2*2+hrN2*1.5,0,Math.PI*2);
    ctx.fillStyle=lineColor(hpt.hr,1);
    ctx.shadowColor=lineColor(hpt.hr,0.8); ctx.shadowBlur=8+hrN2*10;
    ctx.fill(); ctx.shadowBlur=0;
  }
  ctx.restore();
}

// ══ GPX UPLOAD ═══════════════════════════════════════════════════════════════
var trackData = TRACK.slice(); // copia del track actual

function parseGPX(text){
  var parser=new DOMParser();
  var xml=parser.parseFromString(text,'text/xml');
  var ns='http://www.topografix.com/GPX/1/1';
  var trkpts=xml.getElementsByTagNameNS(ns,'trkpt');
  if(trkpts.length===0) trkpts=xml.getElementsByTagName('trkpt');
  var pts=[];
  var fmt='%Y-%m-%dT%H:%M:%SZ';

  for(var i=0;i<trkpts.length;i++){
    var tp=trkpts[i];
    var lat=parseFloat(tp.getAttribute('lat'));
    var lon=parseFloat(tp.getAttribute('lon'));
    var eleEl=tp.getElementsByTagName('ele')[0]||tp.getElementsByTagNameNS('*','ele')[0];
    var ele=eleEl?parseFloat(eleEl.textContent):90;
    var timeEl=tp.getElementsByTagName('time')[0]||tp.getElementsByTagNameNS('*','time')[0];
    var timeStr=timeEl?timeEl.textContent:'';
    // cadencia
    var cad=0;
    var cadEls=tp.getElementsByTagName('cadence');
    if(cadEls.length===0) cadEls=tp.getElementsByTagNameNS('*','cadence');
    if(cadEls.length===0) cadEls=tp.getElementsByTagNameNS('*','cad');
    if(cadEls.length>0) cad=parseInt(cadEls[0].textContent)||0;
    // HR
    var hr=100;
    var hrEls=tp.getElementsByTagName('hr');
    if(hrEls.length===0) hrEls=tp.getElementsByTagNameNS('*','hr');
    if(hrEls.length>0) hr=parseInt(hrEls[0].textContent)||100;
    pts.push({lat,lon,ele,time:timeStr,cadence:cad,hr});
  }
  if(pts.length<2) return null;

  // calcular bounds
  var latMin=Infinity,latMax=-Infinity,lonMin=Infinity,lonMax=-Infinity;
  var eleMin=Infinity,eleMax=-Infinity,hrMin=Infinity,hrMax=-Infinity,spdMax=0;
  for(var p of pts){
    latMin=Math.min(latMin,p.lat); latMax=Math.max(latMax,p.lat);
    lonMin=Math.min(lonMin,p.lon); lonMax=Math.max(lonMax,p.lon);
    eleMin=Math.min(eleMin,p.ele); eleMax=Math.max(eleMax,p.ele);
    hrMin=Math.min(hrMin,p.hr);   hrMax=Math.max(hrMax,p.hr);
  }
  var latPad=(latMax-latMin)*0.08, lonPad=(lonMax-lonMin)*0.08;
  latMin-=latPad; latMax+=latPad; lonMin-=lonPad; lonMax+=lonPad;

  // calcular heading, speed, dt
  var normalized=[];
  var totalTime=0;
  for(var i=0;i<pts.length;i++){
    var p=pts[i];
    var nx=0.07+(p.lon-lonMin)/(lonMax-lonMin)*0.86;
    var ny=0.07+(1-(p.lat-latMin)/(latMax-latMin))*0.86;
    var heading=0,speed=0,dt=10;
    if(i>0){
      var p0=pts[i-1];
      var dlat=(p.lat-p0.lat)*111320;
      var dlon=(p.lon-p0.lon)*111320*Math.cos(p0.lat*Math.PI/180);
      var dist=Math.sqrt(dlat*dlat+dlon*dlon);
      heading=(Math.atan2(dlon,dlat)*180/Math.PI+360)%360;
      try{
        var t0=new Date(p0.time),t1=new Date(p.time);
        dt=Math.max(1,(t1-t0)/1000);
      }catch(e){ dt=10; }
      speed=dist/dt;
      spdMax=Math.max(spdMax,speed);
    }
    totalTime+=dt;
    normalized.push({nx:Math.round(nx*100000)/100000,ny:Math.round(ny*100000)/100000,
      ele:p.ele,cadence:p.cadence,hr:p.hr,
      heading:Math.round(heading*10)/10,
      speed:Math.round(speed*100)/100,dt:Math.round(dt*10)/10});
  }

  return {pts:normalized,eleMin,eleMax,hrMin,hrMax,spdMax,
          totalSecs:Math.round(totalTime),count:pts.length};
}

function loadGPXData(result){
  // actualizar constantes globales
  window.ELE_MIN_DYN=result.eleMin;
  window.ELE_MAX_DYN=result.eleMax===result.eleMin?result.eleMin+1:result.eleMax;
  window.HR_MIN_DYN=result.hrMin;
  window.HR_MAX_DYN=result.hrMax===result.hrMin?result.hrMin+1:result.hrMax;
  window.SPD_MAX_DYN=result.spdMax<0.1?1:result.spdMax;
  window.REAL_DUR=result.totalSecs;
  trackData=result.pts;
  // reset
  cycleT=0; lastIdx=-1;
  ctx.clearRect(0,0,cv.width,cv.height);
  // actualizar UI
  var mins=Math.floor(result.totalSecs/60),secs=result.totalSecs%60;
  document.querySelector('.panel-sub').textContent=
    result.count+' pts · '+mins+'min '+secs+'s · ele '+Math.round(result.eleMin)+'→'+Math.round(result.eleMax)+'m';
  document.getElementById('spd').value=0;
  document.getElementById('spd-v').textContent='1.0x · '+mins+':'+(secs<10?'0':'')+secs;
  P.speed=1;
}

// drag & drop + file input
var gpxDrop=document.getElementById('gpx-drop');
var gpxFile=document.getElementById('gpx-file');

gpxDrop.addEventListener('dragover',function(e){e.preventDefault();this.classList.add('drag');});
gpxDrop.addEventListener('dragleave',function(){this.classList.remove('drag');});
gpxDrop.addEventListener('drop',function(e){
  e.preventDefault(); this.classList.remove('drag');
  var f=e.dataTransfer.files[0];
  if(f) readGPXFile(f);
});
gpxFile.addEventListener('change',function(){
  if(this.files[0]) readGPXFile(this.files[0]);
});

function readGPXFile(file){
  var info=document.getElementById('gpx-info');
  info.textContent='Cargando...';
  var reader=new FileReader();
  reader.onload=function(e){
    var result=parseGPX(e.target.result);
    if(!result){ info.textContent='Error: GPX no válido'; return; }
    loadGPXData(result);
    info.textContent=file.name+' · '+result.count+' pts';
    if(!playing){playing=true;document.getElementById('btn-play').classList.add('active');}
  };
  reader.readAsText(file);
}

// ══ START ═══════════════════════════════════════════════════════════════════
document.getElementById('start').addEventListener('click',function(){
  this.style.display='none';
  initAudio();
  playing=true;
  document.getElementById('btn-play').classList.add('active');
  requestAnimationFrame(loop);
});
</script>
