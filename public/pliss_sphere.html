const BOUNDS = LINES_DATA.bounds;
const CENTER_LAT = (BOUNDS.minLat+BOUNDS.maxLat)/2;
const CENTER_LON = (BOUNDS.minLon+BOUNDS.maxLon)/2;
const RANGE_LAT  = BOUNDS.maxLat-BOUNDS.minLat;
const RANGE_LON  = BOUNDS.maxLon-BOUNDS.minLon;
const ELE_MIN=63, ELE_MAX=136;

// Map GPS → equirectangular UV on the crop canvas
// The crop fills a 120° horizontal × 50° vertical zone centered at front
const H_DEG=120, V_DEG=50;
const H_RAD=H_DEG*Math.PI/180, V_RAD=V_DEG*Math.PI/180;

// Equirectangular canvas size (the "video" that wraps the sphere)
const EQ_W=4096, EQ_H=2048;

function gpsToEqXY(lat, lon) {
  const nx = (lon-CENTER_LON)/(RANGE_LON*.5); // -1..1
  const ny = (lat-CENTER_LAT)/(RANGE_LAT*.5); // -1..1
  const lonRad = nx * H_RAD * .5;
  const latRad = ny * V_RAD * .5;
  // equirectangular: lon→x, lat→y
  const u = (lonRad/Math.PI)*.5 + .5;
  const v = (latRad/(Math.PI*.5))*.5 + .5;
  return { x: u*EQ_W, y: (1-v)*EQ_H };
}

// ── CROP ANIMATION CANVAS (equirectangular) ───────────────────────────────────
const eqCanvas = document.createElement('canvas');
eqCanvas.width = EQ_W; eqCanvas.height = EQ_H;
const eqCtx = eqCanvas.getContext('2d');

// Animation state
let head1=0, head2=0;
const FADE_SECS=60;
const births1=new Array(LINES_DATA.line1.length).fill(null);
const births2=new Array(LINES_DATA.line2.length).fill(null);
let playSpeed=8; // points per tick
let lastTick=0;

function tickCrop(now) {
  if(now-lastTick < 80) return; // ~12fps advance
  lastTick=now;
  for(let s=0;s<playSpeed;s++){
    if(head1<LINES_DATA.line1.length){ births1[head1]=now; head1++; }
    else { head1=0; births1.fill(null); }
    if(head2<LINES_DATA.line2.length){ births2[head2]=now; head2++; }
    else { head2=0; births2.fill(null); }
  }
}

function drawCrop(now) {
  // Fade existing drawing — creates trail effect
  eqCtx.fillStyle='rgba(0,0,0,0.012)';
  eqCtx.fillRect(0,0,EQ_W,EQ_H);

  const lines = [
    { pts:LINES_DATA.line1, births:births1, r:0.78,g:0.32,b:1.0 },
    { pts:LINES_DATA.line2, births:births2, r:0.22,g:0.80,b:1.0 },
  ];

  lines.forEach(({pts,births,r,g,b})=>{
    for(let i=1;i<pts.length;i++){
      if(births[i]===null)continue;
      const age=(now-births[i])/1000;
      if(age>FADE_SECS)continue;
      const fadeAlpha=Math.max(0,1-(age/FADE_SECS));

      const p0=pts[i-1], p1=pts[i];
      const c0=gpsToEqXY(p0.lat,p0.lon);
      const c1=gpsToEqXY(p1.lat,p1.lon);
      if(Math.abs(c0.x-c1.x)>500||Math.abs(c0.y-c1.y)>500)continue;

      const ele=p1.ele||100;
      const bright=0.5+(ele-ELE_MIN)/(ELE_MAX-ELE_MIN)*.5;
      const spd=p1.spd||3;
      const w=Math.max(3, (8-(spd/12)*6)) * (EQ_W/800); // scale to eq canvas

      // glow
      eqCtx.beginPath();eqCtx.moveTo(c0.x,c0.y);eqCtx.lineTo(c1.x,c1.y);
      eqCtx.strokeStyle=`rgba(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)},${fadeAlpha*0.25})`;
      eqCtx.lineWidth=w*3.5;eqCtx.lineCap='round';eqCtx.stroke();
      // line
      eqCtx.beginPath();eqCtx.moveTo(c0.x,c0.y);eqCtx.lineTo(c1.x,c1.y);
      eqCtx.strokeStyle=`rgba(${Math.round(r*bright*255)},${Math.round(g*bright*255)},${Math.round(b*bright*255)},${fadeAlpha*0.95})`;
      eqCtx.lineWidth=w;eqCtx.stroke();
    }
  });
}

// ── WEBGL SPHERE ──────────────────────────────────────────────────────────────
const sphere = document.getElementById('sphere');
const gl = sphere.getContext('webgl')||sphere.getContext('experimental-webgl');

const vsrc = `
  attribute vec2 a;
  varying vec2 v;
  void main(){ v=a*.5+.5; gl_Position=vec4(a,0,1); }
`;
const fsrc = `
  precision mediump float;
  varying vec2 v;
  uniform sampler2D u_t;
  uniform mat3 u_r;
  uniform vec2 u_res;
  uniform float u_fov;
  const float PI=3.14159265;
  void main(){
    float asp=u_res.x/u_res.y;
    float x=(v.x*2.-1.)*asp, y=v.y*2.-1.;
    vec3 ray=normalize(vec3(x*u_fov, y*u_fov, -1.));
    ray=u_r*ray;
    float lon=atan(ray.x,-ray.z);
    float lat=asin(clamp(ray.y,-1.,1.));
    float u=(lon/PI)*.5+.5;
    float vv=(lat/(PI*.5))*.5+.5;
    gl_FragColor=texture2D(u_t,vec2(u,1.-vv));
  }
`;

function mkS(src,t){const s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);return s;}
const prog=gl.createProgram();
gl.attachShader(prog,mkS(vsrc,gl.VERTEX_SHADER));
gl.attachShader(prog,mkS(fsrc,gl.FRAGMENT_SHADER));
gl.linkProgram(prog);gl.useProgram(prog);

const qb=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,qb);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aL=gl.getAttribLocation(prog,'a');
gl.enableVertexAttribArray(aL);gl.vertexAttribPointer(aL,2,gl.FLOAT,false,0,0);
const uR=gl.getUniformLocation(prog,'u_r');
const uT=gl.getUniformLocation(prog,'u_t');
const uRes=gl.getUniformLocation(prog,'u_res');
const uFov=gl.getUniformLocation(prog,'u_fov');

// Dynamic texture from eqCanvas
const tex=gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D,tex);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);

// ── NAVIGATION ────────────────────────────────────────────────────────────────
let yaw=0,pitch=0,velX=0,velY=0,fov=0.82;
const FOV_MIN=0.2,FOV_MAX=1.4;
let dragging=false,lastX=0,lastY=0;
let gyroOn=false,gyroYaw=0,gyroPitch=0,gyroA0=null,gyroB0=null;
const isMobile=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
if(isMobile)document.getElementById('gyro-btn').style.display='block';

sphere.addEventListener('mousedown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;velX=velY=0;});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const dx=e.clientX-lastX,dy=e.clientY-lastY;
  velX=dx;velY=dy;
  yaw-=dx*.004*fov;pitch-=dy*.003*fov;
  pitch=Math.max(-1.4,Math.min(1.4,pitch));
  lastX=e.clientX;lastY=e.clientY;
});
window.addEventListener('mouseup',()=>dragging=false);
sphere.addEventListener('wheel',e=>{
  e.preventDefault();fov*=(1+e.deltaY*.001);
  fov=Math.max(FOV_MIN,Math.min(FOV_MAX,fov));
},{passive:false});

let pd0=null,fv0=fov;
sphere.addEventListener('touchstart',e=>{
  e.preventDefault();velX=velY=0;
  if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}
  else{dragging=false;pd0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);fv0=fov;}
},{passive:false});
sphere.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&dragging){
    const dx=e.touches[0].clientX-lastX,dy=e.touches[0].clientY-lastY;
    velX=dx;velY=dy;
    yaw-=dx*.005*fov;pitch-=dy*.004*fov;
    pitch=Math.max(-1.4,Math.min(1.4,pitch));
    lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
  }else if(e.touches.length===2&&pd0){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    fov=Math.max(FOV_MIN,Math.min(FOV_MAX,fv0*(pd0/d)));
  }
},{passive:false});
sphere.addEventListener('touchend',e=>{
  e.preventDefault();
  if(e.touches.length<2)pd0=null;
  if(!e.touches.length)dragging=false;
},{passive:false});

function enableGyro(){
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function')
    DeviceOrientationEvent.requestPermission().then(s=>{if(s==='granted')startGyro();});
  else startGyro();
}
function startGyro(){
  gyroOn=true;
  const b=document.getElementById('gyro-btn');b.classList.add('on');b.textContent='⊕ ON';
  document.getElementById('hint').textContent='mové el cuerpo · pellizco zoom';
  window.addEventListener('deviceorientation',e=>{
    if(gyroA0===null){gyroA0=e.alpha;gyroB0=e.beta;}
    let da=e.alpha-gyroA0;
    if(da>180)da-=360;if(da<-180)da+=360;
    // Correct direction: turning right increases alpha → view goes left = yaw increases
    gyroYaw = da*Math.PI/180;
    // Tilting forward increases beta → view goes up = pitch decreases
    gyroPitch = (e.beta-gyroB0)*Math.PI/180*.6;
    gyroPitch=Math.max(-1.3,Math.min(1.3,gyroPitch));
  },true);
}

function rotMat(y,p){
  const cy=Math.cos(y),sy=Math.sin(y),cp=Math.cos(p),sp=Math.sin(p);
  return[cy,sy*sp,sy*cp, 0,cp,-sp, -sy,cy*sp,cy*cp];
}

function resize(){
  const dpr=Math.min(devicePixelRatio,2);
  sphere.width=window.innerWidth*dpr;sphere.height=window.innerHeight*dpr;
  sphere.style.width=window.innerWidth+'px';sphere.style.height=window.innerHeight+'px';
  gl.viewport(0,0,sphere.width,sphere.height);
}
resize();window.addEventListener('resize',resize);

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
function render(now){
  // inertia
  if(!dragging&&!gyroOn){
    yaw+=velX*.0006;velX*=.90;
    pitch+=velY*.0006;velY*=.90;
    pitch=Math.max(-1.4,Math.min(1.4,pitch));
  }
  const ty=yaw+(gyroOn?gyroYaw:0);
  const tp=pitch+(gyroOn?gyroPitch:0);

  // Advance and draw crop animation
  tickCrop(now);
  drawCrop(now);

  // Upload equirectangular canvas as texture
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,eqCanvas);

  // Render sphere
  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER,qb);
  gl.vertexAttribPointer(aL,2,gl.FLOAT,false,0,0);
  gl.uniform1i(uT,0);
  gl.uniform2f(uRes,sphere.width,sphere.height);
  gl.uniform1f(uFov,fov);
  gl.uniformMatrix3fv(uR,false,rotMat(ty,tp));
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
