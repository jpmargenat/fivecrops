const ELE_RANGE = [64.6, 114.4];

// Map GPS → equirectangular UV
// Crop spreads 80° horizontal × 40° vertical centered at front
const H_RAD = 80 * Math.PI / 180;
const V_RAD = 40 * Math.PI / 180;
const EQ_W = 2048, EQ_H = 1024;

function gpsToEqXY(lat, lon) {
  const nx = (lon - CENTER_LON) / (RANGE_LON * 0.5);
  const ny = (lat - CENTER_LAT) / (RANGE_LAT * 0.5);
  const lonRad = nx * H_RAD * 0.5;
  const latRad = ny * V_RAD * 0.5;
  const u = (lonRad / Math.PI) * 0.5 + 0.5;
  const v = (latRad / (Math.PI * 0.5)) * 0.5 + 0.5;
  return { x: u * EQ_W, y: (1 - v) * EQ_H };
}

const PALETTE = [

const eqCanvas = document.createElement('canvas');
eqCanvas.width = EQ_W; eqCanvas.height = EQ_H;
const eqCtx = eqCanvas.getContext('2d');

// Per-route head and births
const heads  = ROUTES.map(() => 0);
const births = ROUTES.map(r => new Array(r.pts.length).fill(null));
const FADE_SECS = 60;
let lastTick = 0;
let playSpeed = 1; // points per route per tick — slow

function tickCrop(now) {
  if (now - lastTick < 240) return; // ~4fps advance — 4x slower
  lastTick = now;
  ROUTES.forEach((r, ri) => {
    for (let s = 0; s < playSpeed; s++) {
      if (heads[ri] < r.pts.length) {
        births[ri][heads[ri]] = now;
        heads[ri]++;
      } else {
        heads[ri] = 0;
        births[ri].fill(null);
      }
    }
  });
}

function drawCrop(now) {
  // Fade — slow dissolve of old strokes
  eqCtx.fillStyle = 'rgba(0,0,0,0.008)';
  eqCtx.fillRect(0, 0, EQ_W, EQ_H);

  ROUTES.forEach((route, ri) => {
    const color = PALETTE[ri % PALETTE.length];
    const rgb = hexToRgb(color);
    const pts = route.pts;
    const bs  = births[ri];

    for (let i = 1; i < pts.length; i++) {
      if (bs[i] === null) continue;
      const age = (now - bs[i]) / 1000;
      if (age > FADE_SECS) continue;
      const fade = Math.max(0, 1 - age / FADE_SECS);

      const p0 = pts[i-1], p1 = pts[i];
      const c0 = gpsToEqXY(p0.lat, p0.lon);
      const c1 = gpsToEqXY(p1.lat, p1.lon);
      if (Math.abs(c0.x - c1.x) > 200 || Math.abs(c0.y - c1.y) > 200) continue;

      const ele  = p1.ele || 90;
      const eleN = Math.min(1, (ele - ELE_RANGE[0]) / (ELE_RANGE[1] - ELE_RANGE[0]) * 2.0);
      const bright = 0.35 + eleN * 0.65;
      const spd  = p1.spd || 3;
      const w    = Math.max(0.8, (2.5 - (spd / 12) * 1.8)) * (EQ_W / 800);

      const r2 = Math.round(rgb.r * bright);
      const g  = Math.round(rgb.g * bright);
      const b  = Math.round(rgb.b * bright);

      // glow
      eqCtx.beginPath(); eqCtx.moveTo(c0.x, c0.y); eqCtx.lineTo(c1.x, c1.y);
      eqCtx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${fade * 0.2})`;
      eqCtx.lineWidth = w * 2.5; eqCtx.lineCap = 'round'; eqCtx.stroke();
      // line
      eqCtx.beginPath(); eqCtx.moveTo(c0.x, c0.y); eqCtx.lineTo(c1.x, c1.y);
      eqCtx.strokeStyle = `rgba(${r2},${g},${b},${fade * 0.92})`;
      eqCtx.lineWidth = w; eqCtx.stroke();
    }
  });
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

  velX=dx; velY=dy;
  yaw-=dx*.004*fov; pitch-=dy*.003*fov;
  pitch=Math.max(-1.4,Math.min(1.4,pitch));
  lastX=e.clientX; lastY=e.clientY;
});
window.addEventListener('mouseup',()=>dragging=false);
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  fov*=(1+e.deltaY*.001);
  fov=Math.max(FOV_MIN,Math.min(FOV_MAX,fov));
},{passive:false});

let pd0=null, fv0=fov;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); velX=velY=0;
  if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}
  else{dragging=false;pd0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);fv0=fov;}
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&dragging){
    const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
    velX=dx; velY=dy;
    yaw-=dx*.005*fov; pitch-=dy*.004*fov;
    pitch=Math.max(-1.4,Math.min(1.4,pitch));
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }else if(e.touches.length===2&&pd0){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    fov=Math.max(FOV_MIN,Math.min(FOV_MAX,fv0*(pd0/d)));
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(e.touches.length<2)pd0=null;
  if(!e.touches.length)dragging=false;
},{passive:false});

function enableGyro(){
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function')
    DeviceOrientationEvent.requestPermission().then(s=>{if(s==='granted')startGyro();});
  else startGyro();
}
function startGyro(){
  gyroOn=true;
  document.getElementById('gyro-btn').classList.add('on');
  document.getElementById('gyro-btn').textContent='⊕ ON';
  document.getElementById('hint').textContent='mové el cuerpo · pellizco zoom';
  window.addEventListener('deviceorientation',e=>{
    if(gyroA0===null){gyroA0=e.alpha;gyroB0=e.beta;}
    let da=e.alpha-gyroA0;
    if(da>180)da-=360; if(da<-180)da+=360;
    gyroYaw=-da*Math.PI/180;
    gyroPitch=(e.beta-gyroB0)*Math.PI/180*0.6;
    gyroPitch=Math.max(-1.3,Math.min(1.3,gyroPitch));
  },true);
}

function rotMat(y,p){
  const cy=Math.cos(y),sy=Math.sin(y),cp=Math.cos(p),sp=Math.sin(p);
  return[cy,sy*sp,sy*cp, 0,cp,-sp, -sy,cy*sp,cy*cp];
}

function resize(){
  const dpr=Math.min(devicePixelRatio,2);
  canvas.width=window.innerWidth*dpr; canvas.height=window.innerHeight*dpr;
  canvas.style.width=window.innerWidth+'px'; canvas.style.height=window.innerHeight+'px';
  gl.viewport(0,0,canvas.width,canvas.height);
}
resize(); window.addEventListener('resize',resize);

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
let frameCount = 0;
function render(now){
  // inertia
  if(!dragging&&!gyroOn){
    yaw+=velX*.0006; velX*=.90;
    pitch+=velY*.0006; velY*=.90;
    pitch=Math.max(-1.4,Math.min(1.4,pitch));
  }
  const ty=yaw+(gyroOn?gyroYaw:0);
  const tp=pitch+(gyroOn?gyroPitch:0);

  // Advance + draw crop animation
  tickCrop(now);
  drawCrop(now);

  // Upload canvas as texture every frame
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,eqCanvas);

  // Render sphere
  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER,qb);
  gl.vertexAttribPointer(aL,2,gl.FLOAT,false,0,0);
  gl.uniform1i(uT,0);
  gl.uniform2f(uRes,canvas.width,canvas.height);
  gl.uniform1f(uFov,fov);
  gl.uniformMatrix3fv(uR,false,rotMat(ty,tp));
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  // Update info
  frameCount++;
  if(frameCount%60===0){
    const active=heads.filter((h,i)=>h>0&&h<ROUTES[i].pts.length).length;
    document.getElementById('info').textContent=
      `${active} rutas activas · ${ROUTES.length} total`;
  }

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
