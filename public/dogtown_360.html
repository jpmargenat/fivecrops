// ── INPUT ─────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousedown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;velX=velY=0;});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const dx=e.clientX-lastX,dy=e.clientY-lastY;
  velX=dx;velY=dy;yaw-=dx*.004*fov;pitch-=dy*.003*fov;
  pitch=Math.max(-1.4,Math.min(1.4,pitch));lastX=e.clientX;lastY=e.clientY;
});
window.addEventListener('mouseup',()=>dragging=false);
canvas.addEventListener('wheel',e=>{e.preventDefault();fov*=(1+e.deltaY*.001);fov=Math.max(FOV_MIN,Math.min(FOV_MAX,fov));},{passive:false});
let pd0=null,fv0=fov;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();velX=velY=0;
  if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}
  else{dragging=false;pd0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);fv0=fov;}
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&dragging){
    const dx=e.touches[0].clientX-lastX,dy=e.touches[0].clientY-lastY;
    velX=dx;velY=dy;yaw-=dx*.005*fov;pitch-=dy*.004*fov;
    pitch=Math.max(-1.4,Math.min(1.4,pitch));lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
  }else if(e.touches.length===2&&pd0){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    fov=Math.max(FOV_MIN,Math.min(FOV_MAX,fv0*(pd0/d)));
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(e.touches.length<2)pd0=null;if(!e.touches.length)dragging=false;},{passive:false});

function enableGyro(){
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function')
    DeviceOrientationEvent.requestPermission().then(s=>{if(s==='granted')startGyro();});
  else startGyro();
}
function startGyro(){
  gyroOn=true;
  const b=document.getElementById('gyro-btn');b.classList.add('on');b.textContent='⊕ ON';
  document.getElementById('hint').textContent='Mové el cuerpo · pellizco zoom';
  window.addEventListener('deviceorientation',e=>{
    if(gyroA0===null){gyroA0=e.alpha;gyroB0=e.beta;}
    let da=e.alpha-gyroA0;if(da>180)da-=360;if(da<-180)da+=360;
    gyroYaw=-da*Math.PI/180;
    gyroPitch=-(e.beta-gyroB0)*Math.PI/180*.7;
    gyroPitch=Math.max(-1.3,Math.min(1.3,gyroPitch));
  },true);
}

// ── PROJECTION ────────────────────────────────────────────────────────────────
function rotMat(y,p){
  const cy=Math.cos(y),sy=Math.sin(y),cp=Math.cos(p),sp=Math.sin(p);
  return[cy,sy*sp,sy*cp,0,cp,-sp,-sy,cy*sp,cy*cp];
}

function uvToScreen(u,v,rm,fovV){
  const lon=(u-.5)*2*Math.PI,lat=(v-.5)*Math.PI;
  const dx=Math.cos(lat)*Math.sin(lon),dy=Math.sin(lat),dz=-Math.cos(lat)*Math.cos(lon);
  const rx=rm[0]*dx+rm[3]*dy+rm[6]*dz;
  const ry=rm[1]*dx+rm[4]*dy+rm[7]*dz;
  const rz=rm[2]*dx+rm[5]*dy+rm[8]*dz;
  if(rz>=0)return null;
  const asp=canvas.width/canvas.height;
  return{
    x:((rx/(-rz*fovV*asp))*.5+.5)*canvas.width,
    y:(1-(ry/(-rz*fovV))*.5-.5)*canvas.height
  };
}

// ── DRAW PHOTOS as floating panels ────────────────────────────────────────────
function drawPhotos(rm,fovV){
  PHOTO_POSITIONS.forEach(pos=>{
    const img=photoImgs[pos.key];
    if(!img)return;
    // Center point of photo panel
    const {u:uc,v:vc}=angleToUV(pos.lon,pos.lat);
    const sc=uvToScreen(uc,1-vc,rm,fovV);
    if(!sc)return;
    // Size based on fov and scale factor
    const size=canvas.width*pos.scale*(0.85/fovV);
    const aspect=img.width/img.height;
    const pw=size,ph=size/aspect;
    // Draw with low opacity — tenue
    ctx.save();
    ctx.globalAlpha=0.22;
    ctx.filter='grayscale(100%) brightness(0.8)';
    ctx.drawImage(img,sc.x-pw/2,sc.y-ph/2,pw,ph);
    // Subtle frame
    ctx.globalAlpha=0.15;
    ctx.filter='none';
    ctx.strokeStyle='rgba(255,255,255,0.4)';
    ctx.lineWidth=1;
    ctx.strokeRect(sc.x-pw/2,sc.y-ph/2,pw,ph);
    ctx.restore();
  });
}

// ── DRAW LINES ────────────────────────────────────────────────────────────────
function drawLines(rm,fovV){
  const lines=[
    {pts:LINES_DATA.line1,r:0.78,g:0.32,b:1.0},
    {pts:LINES_DATA.line2,r:0.22,g:0.80,b:1.0},
  ];
  lines.forEach(({pts,r,g,b})=>{
    for(let i=1;i<pts.length;i++){
      const p0=pts[i-1],p1=pts[i];
      const {lonRad:l0,latRad:la0}=gpsToAngle(p0.lat,p0.lon);
      const {lonRad:l1,latRad:la1}=gpsToAngle(p1.lat,p1.lon);
      const {u:u0,v:v0}=angleToUV(l0,la0);
      const {u:u1,v:v1}=angleToUV(l1,la1);
      const s0=uvToScreen(u0,1-v0,rm,fovV);
      const s1=uvToScreen(u1,1-v1,rm,fovV);
      if(!s0||!s1)continue;
      if(Math.abs(s0.x-s1.x)>300||Math.abs(s0.y-s1.y)>300)continue;
      const ele=p1.ele||100;
      const bright=0.5+(ele-ELE_MIN)/(ELE_MAX-ELE_MIN)*.5;
      const spd=p1.spd||3;
      const w=Math.max(1.5,5-(spd/12)*3.5);
      // glow
      ctx.beginPath();ctx.moveTo(s0.x,s0.y);ctx.lineTo(s1.x,s1.y);
      ctx.strokeStyle=`rgba(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)},0.15)`;
      ctx.lineWidth=w*4;ctx.lineCap='round';ctx.stroke();
      // line
      ctx.beginPath();ctx.moveTo(s0.x,s0.y);ctx.lineTo(s1.x,s1.y);
      ctx.strokeStyle=`rgba(${Math.round(r*bright*255)},${Math.round(g*bright*255)},${Math.round(b*bright*255)},0.9)`;
      ctx.lineWidth=w;ctx.stroke();
    }
  });
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function initParticles(){
  PARTICLES.length=0;
  for(let i=0;i<70;i++) PARTICLES.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,alpha:Math.random()});
}

function drawParticles(){
  const rad=(windDir+180)*Math.PI/180,spd=windSpeed*.35;
  PARTICLES.forEach(p=>{
    p.x+=Math.cos(rad)*spd+(Math.random()-.5)*.3;
    p.y+=Math.sin(rad)*spd+(Math.random()-.5)*.3;
    if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;
    if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;
    p.alpha+=.008;if(p.alpha>1)p.alpha=0;
    ctx.beginPath();
    ctx.moveTo(p.x,p.y);
    ctx.lineTo(p.x-Math.cos(rad)*spd*5,p.y-Math.sin(rad)*spd*5);
    ctx.strokeStyle=`rgba(180,215,255,${p.alpha*.3})`;
    ctx.lineWidth=.8;ctx.stroke();
  });
}

// ── LABELS ────────────────────────────────────────────────────────────────────
const overlay=document.getElementById('overlay');
const labelEls=[];
function buildLabels(){
  WIKI_TEXTS.forEach((txt,i)=>{
    const lon=(i/WIKI_TEXTS.length)*2*Math.PI-Math.PI;
    const lat=(Math.random()-.5)*.7;
    const u=(lon/Math.PI)*.5+.5,v=(lat/(Math.PI*.5))*.5+.5;
    const el=document.createElement('div');
    el.className='label label-wiki';el.textContent=txt;
    el.dataset.u=u;el.dataset.v=1-v;
    overlay.appendChild(el);labelEls.push(el);
  });
  const step=Math.floor(LINES_DATA.line1.length/STREET_NAMES.length);
  STREET_NAMES.forEach((name,i)=>{
    const pt=LINES_DATA.line1[i*step]||LINES_DATA.line1[0];
    const {lonRad,latRad}=gpsToAngle(pt.lat,pt.lon);
    const {u,v}=angleToUV(lonRad,latRad);
    const el=document.createElement('div');
    el.className='label label-street';el.textContent=name;
    el.dataset.u=u;el.dataset.v=1-v;
    overlay.appendChild(el);labelEls.push(el);
  });
  const ds=Math.floor(LINES_DATA.line1.length/8);
  for(let i=0;i<8;i++){
    const pt=LINES_DATA.line1[i*ds]||LINES_DATA.line1[0];
    const {lonRad,latRad}=gpsToAngle(pt.lat,pt.lon);
    const {u,v}=angleToUV(lonRad,latRad+.1);
    const el=document.createElement('div');
    el.className='label label-data';
    el.textContent=`${pt.ele?.toFixed(0)||'?'}m · ${(pt.spd||0).toFixed(1)}m/s`;
    el.dataset.u=u;el.dataset.v=1-v;
    overlay.appendChild(el);labelEls.push(el);
  }
}

function updateLabels(rm,fovV){
  const W=window.innerWidth,H=window.innerHeight;
  labelEls.forEach(el=>{
    const u=parseFloat(el.dataset.u),v=parseFloat(el.dataset.v);
    // scale canvas coords to window
    const pos=uvToScreen(u,v,rm,fovV);
    if(!pos){el.style.opacity='0';return;}
    const wx=pos.x/canvas.width*W,wy=pos.y/canvas.height*H;
    if(wx<0||wx>W||wy<0||wy>H){el.style.opacity='0';return;}
    el.style.left=wx+'px';el.style.top=wy+'px';el.style.opacity='1';
  });
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
async function fetchData(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.048&longitude=-118.253&current=wind_speed_10m,wind_direction_10m&wind_speed_unit=ms');
    const j=await r.json();
    windSpeed=j.current?.wind_speed_10m||3;windDir=j.current?.wind_direction_10m||270;
    document.getElementById('wind-line').textContent=`viento: ${windSpeed.toFixed(1)}m/s · ${windDir}°`;
  }catch(e){}
  try{
    const r=await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson');
    const j=await r.json();
    const qs=j.features.filter(f=>Math.abs(f.geometry.coordinates[1]-34.05)<2&&Math.abs(f.geometry.coordinates[0]+118.25)<2);
    if(qs.length){
      const mag=qs[0].properties.mag;
      document.getElementById('quake-line').textContent=`sismo: M${mag.toFixed(1)}`;
      const intensity=Math.min(1,mag/6);
      document.getElementById('quake-bar').style.background=`rgba(255,${Math.round(100-intensity*100)},0,${0.4+intensity*.5})`;
    }else{document.getElementById('quake-line').textContent='sismo: calmo';}
  }catch(e){}
}
setInterval(fetchData,60000);

// ── RESIZE ────────────────────────────────────────────────────────────────────
function resize(){
  const dpr=Math.min(devicePixelRatio,2);
  canvas.width=window.innerWidth*dpr;canvas.height=window.innerHeight*dpr;
  canvas.style.width=window.innerWidth+'px';canvas.style.height=window.innerHeight+'px';
  initParticles();
}
resize();window.addEventListener('resize',resize);

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  if(!dragging&&!gyroOn){yaw+=velX*.0006;velX*=.90;pitch+=velY*.0006;velY*=.90;pitch=Math.max(-1.4,Math.min(1.4,pitch));}
  const ty=yaw+(gyroOn?gyroYaw:0),tp=pitch+(gyroOn?gyroPitch:0);
  const rm=rotMat(ty,tp);

  // Black background
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawPhotos(rm,fov);
  drawLines(rm,fov);
  drawParticles();
  updateLabels(rm,fov);
  requestAnimationFrame(render);
}
render();
</script>
