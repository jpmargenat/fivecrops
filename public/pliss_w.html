<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PLISS — Inverted View / UCLA Westwood</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
/* FONDO CLARO / ESTÉTICA TÉCNICA */
html, body { width:100%; height:100%; background:#f5f5f0; overflow:hidden; font-family:'Courier New', monospace; color: #1a1a1a; }

#layout {
  position: absolute;
  height: 100vh;
  width: calc(100vh * 9216 / 2592);
  left: 50%;
  transform: translateX(-50%);
  display: grid;
  grid-template-columns: 2592fr 4032fr 2592fr;
  grid-template-rows: 1fr;
  gap: 0;
  max-width: 100vw;
}

@media (max-aspect-ratio: 9216/2592) {
  #layout {
    width: 100vw;
    height: calc(100vw * 2592 / 9216);
    top: 50%;
    left: 0;
    transform: translateY(-50%);
  }
}

/* PANELES INVERTIDOS */
#panel-left { background: #fafafa; padding: 4% 5%; border-right: 1px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; position: relative; }
#panel-center { background: #ffffff; position: relative; overflow: hidden; }
#panel-right { background: #fafafa; border-left: 1px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }

.panel-title { font-size: 1.1vh; font-weight: bold; letter-spacing: 0.4vh; color: #888; margin-bottom: 3vh; text-transform: uppercase; }
.node { display: flex; align-items: center; gap: 1.2vh; margin-bottom: 0.5vh; }
.node-dot { width: 0.8vh; height: 0.8vh; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0.5vh rgba(0,0,0,0.2); }
.node-label { font-size: 1vh; letter-spacing: 0.2vh; color: #444; text-transform: uppercase; flex: 1; }
.node-val { font-size: 1.3vh; font-weight: bold; text-align: right; min-width: 7vh; }
.node-src { font-size: 0.75vh; letter-spacing: 0.15vh; color: #aaa; margin-left: 2vh; margin-bottom: 1.5vh; }

#bg-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
.center-label { position: absolute; bottom: 2vh; left: 50%; transform: translateX(-50%); font-size: 0.75vh; letter-spacing: 0.5vh; color: #ccc; text-transform: uppercase; white-space: nowrap; pointer-events: none; }

#tg-messages { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 1vh; padding: 2vh; }
.tg-msg { padding: 1vh 1.2vh; border-left: 2px solid #ff5030; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 1vh; }
.tg-msg-text { font-size: 0.95vh; color: #333; line-height: 1.7; }

/* STATUS BAR INVERTIDA */
#statusbar { position: fixed; bottom: 0; left: 0; right: 0; height: 2.2vh; background: #1a1a1a; color: #eee; display: flex; align-items: center; padding: 0 2vh; gap: 3vh; z-index: 100; }
.sb-item { font-size: 0.7vh; letter-spacing: 0.15vh; }
.section-tag { font-size: 0.75vh; letter-spacing: 0.3vh; color: #999; text-transform: uppercase; }
</style>
</head>
<body>

<div id="layout">
  <div id="panel-left">
    <div class="panel-title">Data Feed · Westwood</div>
    <div class="node"><div class="node-dot" style="background:#cc2010;"></div><div class="node-label">Sismo</div><div class="node-val" id="left-seis" style="color:#cc2010;">—</div></div>
    <div class="node-src">USGS Hazards Program</div>
    <div class="connector" style="background:linear-gradient(to bottom, #eee, transparent);"></div>
    <div class="node"><div class="node-dot" id="aqi-dot" style="background:#20a020;"></div><div class="node-label">Aire (AQI)</div><div class="node-val" id="left-aqi">—</div></div>
    <div class="node-src">Open-Meteo Air</div>
    <div class="connector" style="background:linear-gradient(to bottom, #eee, transparent);"></div>
    <div class="node"><div class="node-dot" style="background:#2080cc;"></div><div class="node-label">Viento</div><div class="node-val" id="left-wind" style="color:#2080cc;">—</div></div>
    <div class="node-src">Open-Meteo Wind</div>
  </div>

  <div id="panel-center">
    <canvas id="bg-canvas"></canvas>
    <div class="center-label">34.0722°N 118.4402°W · UCLA Campus</div>
  </div>

  <div id="panel-right">
    <div id="sphere-container" style="width: 100%; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center;">
      <div class="section-tag" style="align-self: flex-start; padding: 2vh 0 0 4vh;">Esfera de Metadatos</div>
    </div>
    <div id="tg-feed" style="flex: 1; display: flex; flex-direction: column;">
      <div class="section-tag" style="padding-left: 4vh;">Telegram Feed</div>
      <div id="tg-messages"></div>
    </div>
  </div>
</div>

<div id="statusbar">
  <div class="sb-item">PLISS · CARTOGRAFÍA INVERTIDA</div>
  <div class="sb-item" id="sb-time">00:00:00</div>
  <div class="sb-item" style="margin-left:auto;">AQI <span id="sb-aqi" style="color:#fff">—</span> | VIENTO <span id="sb-wind" style="color:#fff">—</span></div>
</div>

<script>
const env = { aqi: 45, windSpd: 3.0, windDir: 210 };

// CANVAS CENTRAL (PARTÍCULAS OSCURAS SOBRE FONDO CLARO)
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  const p = document.getElementById('panel-center');
  W = canvas.width = p.offsetWidth;
  H = canvas.height = p.offsetHeight;
}

function updateParticles() {
  if (particles.length < 250 && Math.random() < 0.3) {
    particles.push({
      x: Math.random() * W, y: Math.random() * H,
      l: Math.random() * 15 + 5,
      v: (env.windSpd * 0.4) + 1,
      a: (env.windDir + 180) * Math.PI / 180
    });
  }
  ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)'; // Líneas grises suaves
  ctx.lineWidth = 0.8;
  particles.forEach((p, i) => {
    p.x += Math.sin(p.a) * p.v;
    p.y -= Math.cos(p.a) * p.v;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x - Math.sin(p.a) * p.l, p.y + Math.cos(p.a) * p.l);
    ctx.stroke();
    if (p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) particles.splice(i, 1);
  });
  requestAnimationFrame(updateParticles);
}

// THREE.JS (ESFERA CLARA)
let scene, camera, renderer, sphere, photoGroup;

function initThree() {
  const container = document.getElementById('sphere-container');
  const size = container.offsetWidth;
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, 1, 0.1, 1000);
  camera.position.z = 4;
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(size, size);
  container.appendChild(renderer.domElement);

  sphere = new THREE.Mesh(
    new THREE.SphereGeometry(1.6, 64, 64),
    new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0xeeeeee, shininess: 100, transparent: true, opacity: 0.8 })
  );
  scene.add(sphere);

  const wire = new THREE.Mesh(
    new THREE.SphereGeometry(1.63, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0x000000, wireframe: true, transparent: true, opacity: 0.05 })
  );
  sphere.add(wire);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5, 5, 5);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0xcccccc));

  photoGroup = new THREE.Group();
  scene.add(photoGroup);
  animateThree();
}

function animateThree() {
  requestAnimationFrame(animateThree);
  sphere.rotation.y += 0.003 + (env.windSpd * 0.001);
  photoGroup.rotation.y += 0.002;
  sphere.material.emissive.lerp(new THREE.Color(aqiColor(env.aqi)), 0.05);
  renderer.render(scene, camera);
}

const aqiColor = v => v <= 50 ? '#90ee90' : v <= 100 ? '#ffff99' : '#ffcccb';

async function fetchData() {
  try {
    const rA = await fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude=34.0722&longitude=-118.4402&current=us_aqi');
    if (rA.ok) { const d = await rA.json(); env.aqi = d.current.us_aqi; }
    const rW = await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.0722&longitude=-118.4402&current=wind_speed_10m,wind_direction_10m');
    if (rW.ok) { const d = await rW.json(); env.windSpd = d.current.wind_speed_10m; env.windDir = d.current.wind_direction_10m; }
  } catch(e) {}
  updateUI();
}

function updateUI() {
  document.getElementById('left-aqi').textContent = Math.round(env.aqi);
  document.getElementById('left-wind').textContent = env.windSpd.toFixed(1) + 'm/s';
  document.getElementById('sb-aqi').textContent = Math.round(env.aqi);
  document.getElementById('sb-wind').textContent = env.windSpd.toFixed(1) + 'm/s';
}

window.onload = () => {
  resize(); initThree(); updateParticles(); fetchData();
  setInterval(fetchData, 60000);
  setInterval(() => { document.getElementById('sb-time').textContent = new Date().toLocaleTimeString('es-AR'); }, 1000);
};
</script>
</body>
</html>
