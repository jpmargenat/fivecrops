<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PLISS — Flowing Cartographies / UCLA Westwood</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Courier New', monospace; }

/* PROPORCIONES DATALAND: 9216 × 2592 px */
#layout {
  position: absolute;
  height: 100vh;
  width: calc(100vh * 9216 / 2592);
  left: 50%;
  transform: translateX(-50%);
  display: grid;
  grid-template-columns: 2592fr 4032fr 2592fr;
  grid-template-rows: 1fr;
  gap: 0;
  max-width: 100vw;
}

@media (max-aspect-ratio: 9216/2592) {
  #layout {
    width: 100vw;
    height: calc(100vw * 2592 / 9216);
    top: 50%;
    left: 0;
    transform: translateY(-50%);
  }
}

/* Paneles */
#panel-left { background: #04040a; padding: 4% 5%; border-right: 1px solid rgba(255,60,40,0.2); display: flex; flex-direction: column; overflow: hidden; position: relative; }
#panel-center { background: #050509; position: relative; overflow: hidden; }
#panel-right { background: #03030a; border-left: 1px solid rgba(255,60,40,0.2); display: flex; flex-direction: column; overflow: hidden; }

.panel-title { font-size: 1.1vh; letter-spacing: 0.4vh; color: rgba(255,255,255,0.18); margin-bottom: 3vh; text-transform: uppercase; }
.node { display: flex; align-items: center; gap: 1.2vh; margin-bottom: 0.5vh; }
.node-dot { width: 0.8vh; height: 0.8vh; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0.8vh currentColor; }
.node-label { font-size: 1vh; letter-spacing: 0.2vh; color: rgba(255,255,255,0.32); text-transform: uppercase; flex: 1; }
.node-val { font-size: 1.3vh; font-weight: bold; text-align: right; min-width: 7vh; }
.node-src { font-size: 0.75vh; letter-spacing: 0.15vh; color: rgba(255,255,255,0.15); margin-left: 2vh; margin-bottom: 1.5vh; }

#bg-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
.seismic-overlay { position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(180,15,8,0.45) 0%, transparent 65%); opacity: 0; pointer-events: none; }
.center-label { position: absolute; bottom: 2vh; left: 50%; transform: translateX(-50%); font-size: 0.75vh; letter-spacing: 0.5vh; color: rgba(255,255,255,0.1); text-transform: uppercase; white-space: nowrap; pointer-events: none; }

#tg-feed { flex: 1; overflow: hidden; padding: 3% 5%; display: flex; flex-direction: column; }
#tg-messages { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 1vh; }
.tg-msg { padding: 1vh 1.2vh; border-left: 1px solid rgba(255,140,0,0.3); background: rgba(255,140,0,0.03); animation: fadeIn 0.4s ease; }

@keyframes fadeIn { from { opacity:0; transform:translateX(6px); } to { opacity:1; transform:none; } }

#statusbar { position: fixed; bottom: 0; left: 0; right: 0; height: 2.2vh; background: rgba(0,0,0,0.7); display: flex; align-items: center; padding: 0 2vh; gap: 3vh; border-top: 1px solid rgba(255,255,255,0.04); z-index: 100; }
.sb-item { font-size: 0.7vh; letter-spacing: 0.15vh; color: rgba(255,255,255,0.18); }
.section-tag { font-size: 0.75vh; letter-spacing: 0.3vh; color: rgba(255,255,255,0.16); text-transform: uppercase; }
</style>
</head>
<body>

<div id="layout">
  <div id="panel-left">
    <div class="panel-title">Input · Afectaciones</div>
    <div class="node"><div class="node-dot" style="color:#ff3020;background:#ff3020;"></div><div class="node-label">Sismo</div><div class="node-val" id="left-seis">—</div></div>
    <div class="node-src">USGS Earthquake Hazards</div>
    <div class="connector"></div>
    <div class="node"><div class="node-dot" id="aqi-dot" style="color:#00e400;background:#00e400;"></div><div class="node-label">Aire</div><div class="node-val" id="left-aqi">—</div></div>
    <div class="node-src">Open-Meteo Air Quality</div>
    <div class="connector"></div>
    <div class="node"><div class="node-dot" style="color:#4af;background:#4af;"></div><div class="node-label">Viento</div><div class="node-val" id="left-wind">—</div></div>
    <div class="node-src">Open-Meteo Forecast</div>
  </div>

  <div id="panel-center">
    <canvas id="bg-canvas"></canvas>
    <div class="seismic-overlay" id="seismic-overlay"></div>
    <div class="center-label">Westwood · UCLA · 34.0722°N 118.4402°W</div>
  </div>

  <div id="panel-right">
    <div id="sphere-container" style="width: 100%; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center;">
      <div class="section-tag" style="align-self: flex-start; padding: 2vh 0 0 4vh;">Interpretación Esférica</div>
    </div>
    <div id="tg-feed">
      <div class="section-tag" style="margin-bottom:1vh;">Feed de Telegram · FiveCropsTest</div>
      <div id="tg-messages"><div style="font-size:0.9vh; color:rgba(255,255,255,0.15);">Esperando mensajes...</div></div>
    </div>
  </div>
</div>

<div id="statusbar">
  <div class="sb-item">DATALAND · UCLA · WESTWOOD</div>
  <div class="sb-item" id="sb-time">00:00:00</div>
  <div class="sb-item" style="margin-left:auto;">AQI <span id="sb-aqi">—</span> | VIENTO <span id="sb-wind">—</span></div>
</div>

<script>
// ══ ESTADO GLOBAL ════════════════════════════════════════════════════════
const env = { aqi: 45, windSpd: 3.0, windDir: 210, seismic: null };
let seismicFlash = 0;

// ══ CANVAS CENTRAL (VIENTO) ══════════════════════════════════════════════
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  const p = document.getElementById('panel-center');
  W = canvas.width = p.offsetWidth;
  H = canvas.height = p.offsetHeight;
}

function updateParticles() {
  if (particles.length < 300 && Math.random() < 0.2) {
    particles.push({
      x: Math.random() * W, y: Math.random() * H,
      l: Math.random() * 20 + 10,
      v: (env.windSpd * 0.5) + Math.random() * 2,
      a: (env.windDir + 180) * Math.PI / 180
    });
  }
  ctx.fillStyle = 'rgba(5, 5, 9, 0.2)';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(200, 200, 255, 0.15)';
  ctx.lineWidth = 0.5;
  particles.forEach((p, i) => {
    p.x += Math.sin(p.a) * p.v;
    p.y -= Math.cos(p.a) * p.v;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x - Math.sin(p.a) * p.l, p.y + Math.cos(p.a) * p.l);
    ctx.stroke();
    if (p.x < -50 || p.x > W + 50 || p.y < -50 || p.y > H + 50) particles.splice(i, 1);
  });
  requestAnimationFrame(updateParticles);
}

// ══ THREE.JS (ESFERA) ════════════════════════════════════════════════════
let scene, camera, renderer, sphere, photoGroup;

function initThree() {
  const container = document.getElementById('sphere-container');
  const size = container.offsetWidth;
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, 1, 0.1, 1000);
  camera.position.z = 4;
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(size, size);
  container.appendChild(renderer.domElement);

  sphere = new THREE.Mesh(
    new THREE.SphereGeometry(1.6, 64, 64),
    new THREE.MeshPhongMaterial({ color: 0x050505, emissive: 0x111111, shininess: 30, transparent: true, opacity: 0.9 })
  );
  scene.add(sphere);

  const wire = new THREE.Mesh(
    new THREE.SphereGeometry(1.62, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.05 })
  );
  sphere.add(wire);

  const light = new THREE.PointLight(0xffffff, 1, 100);
  light.position.set(5, 5, 5);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0x404040));

  photoGroup = new THREE.Group();
  scene.add(photoGroup);
  animateThree();
}

function animateThree() {
  requestAnimationFrame(animateThree);
  const factor = 0.002 + (env.windSpd * 0.001);
  sphere.rotation.y += factor;
  photoGroup.rotation.y += factor * 0.5;
  sphere.material.emissive.lerp(new THREE.Color(aqiColor(env.aqi)), 0.05);
  renderer.render(scene, camera);
}

function addPhotoToSphere(url) {
  new THREE.TextureLoader().load(url, (tex) => {
    const plane = new THREE.Mesh(
      new THREE.PlaneGeometry(0.7, 0.5),
      new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true, opacity: 0.8 })
    );
    const phi = Math.random() * Math.PI * 2, theta = Math.random() * Math.PI;
    plane.position.set(2 * Math.sin(theta) * Math.cos(phi), 2 * Math.sin(theta) * Math.sin(phi), 2 * Math.cos(theta));
    plane.lookAt(0,0,0);
    photoGroup.add(plane);
    if (photoGroup.children.length > 5) photoGroup.remove(photoGroup.children[0]);
  });
}

// ══ APIS & LOGICA ════════════════════════════════════════════════════════
const aqiColor = v => v <= 50 ? '#00e400' : v <= 100 ? '#ffff00' : v <= 150 ? '#ff7e00' : '#ff0000';

async function fetchData() {
  try {
    const rA = await fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude=34.0722&longitude=-118.4402&current=us_aqi');
    if (rA.ok) { const d = await rA.json(); env.aqi = d.current.us_aqi; }
    const rW = await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.0722&longitude=-118.4402&current=wind_speed_10m,wind_direction_10m');
    if (rW.ok) { const d = await rW.json(); env.windSpd = d.current.wind_speed_10m; env.windDir = d.current.wind_direction_10m; }
  } catch(e) { console.warn("API Offline - Usando modo simulación"); }
  updateUI();
}

function updateUI() {
  const c = aqiColor(env.aqi);
  document.getElementById('left-aqi').textContent = Math.round(env.aqi);
  document.getElementById('left-aqi').style.color = c;
  document.getElementById('aqi-dot').style.background = c;
  document.getElementById('left-wind').textContent = env.windSpd.toFixed(1) + 'm/s';
  document.getElementById('sb-aqi').textContent = Math.round(env.aqi);
  document.getElementById('sb-wind').textContent = env.windSpd.toFixed(1) + 'm/s';
}

// ══ TELEGRAM ═════════════════════════════════════════════════════════════
const TG_TOKEN = '8292313956:AAHQxGj5WHQH68fF7AFVlk8y91DLmgdSIxM';

async function pollTelegram() {
  try {
    const r = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/getUpdates?limit=5`);
    const d = await r.json();
    if (d.ok && d.result.length) d.result.forEach(u => u.message && renderMsg(u.message));
  } catch(e) {}
}

function renderMsg(m) {
  const container = document.getElementById('tg-messages');
  if (container.querySelector('div')) container.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'tg-msg';
  if (m.text) el.innerHTML = `<div class="tg-msg-text">${m.text}</div>`;
  if (m.photo) {
    const fid = m.photo[m.photo.length - 1].file_id;
    fetch(`https://api.telegram.org/bot${TG_TOKEN}/getFile?file_id=${fid}`)
      .then(r => r.json()).then(d => {
        const url = `https://api.telegram.org/file/bot${TG_TOKEN}/${d.result.file_path}`;
        el.innerHTML += `<img src="${url}" class="tg-msg-img">`;
        addPhotoToSphere(url);
      });
  }
  container.prepend(el);
}

// ══ INIT ═════════════════════════════════════════════════════════════════
window.onload = () => {
  resize(); initThree(); updateParticles(); fetchData();
  setInterval(fetchData, 60000);
  setInterval(pollTelegram, 5000);
  setInterval(() => { document.getElementById('sb-time').textContent = new Date().toLocaleTimeString('es-AR'); }, 1000);
};
window.onresize = resize;
</script>
</body>
</html>
