name: Deploy
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: bun install
      - run: bun run build
      - name: Determinar carpeta de salida
        run: |
          if [ -d ".output/public" ]; then
            echo "OUTPUT_PATH=.output/public" >> $GITHUB_ENV
          else
            echo "OUTPUT_PATH=dist" >> $GITHUB_ENV
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: sitio-terminado
          path: ${{ env.OUTPUT_PATH }}
